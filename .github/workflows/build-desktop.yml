name: Build Desktop Executables

on:
  push:
    branches:
      - develop
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            package_script: dist:win
            artifact_name: nexus-windows
            artifact_paths: |
              release/*.exe
              release/*.blockmap
              release/*.yml
          - name: macOS
            os: macos-latest
            package_script: dist:mac
            artifact_name: nexus-macos
            artifact_paths: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/*.yml

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          # electron-builder names artifacts "${productName}-${version}", reading version from
          # package.json. Stamp it from the tag (e.g. v2.0.1 -> 2.0.1; semver has no leading "v")
          # so released files carry the tag instead of the placeholder version in package.json.
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting package version to $VERSION (from tag $GITHUB_REF_NAME)"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Check Electron main process
        run: node --check electron/main.cjs

      - name: Check Electron preload
        run: node --check electron/preload.cjs

      - name: Build renderer
        run: npm run build

      - name: Build package
        run: npm run ${{ matrix.package_script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: write

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nexus-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*.exe
            release-artifacts/*.dmg
          # Only the Windows installer (.exe) and macOS disk image (.dmg) are published for now.
          # To also publish the other build outputs, move these globs back under `files:` above
          # (they must be indented to match the lines above — kept dedented here so YAML treats
          # them as comments rather than as glob patterns inside the block scalar):
          #   release-artifacts/*.zip
          #   release-artifacts/*.blockmap
          #   release-artifacts/*.yml
